name: Test Pipeline
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Tests passing!"
      - name: PipelineIQ
        if: always()
        uses: Raja-Karuppasamy/pipelineiq-action@v1.2
        with:
          api-key: ${{ secrets.PIPELINEIQ_API_KEY }}
          job-status: ${{ job.status }}
